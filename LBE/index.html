  <script>
  /* ================================================
     VARIANT DETECTION
     Reads /LBE from window.location.pathname → sorts
     LBE-tagged projects to the front of each grid.
     ================================================ */
  const VARIANT = (function () {
    const p = window.location.pathname.replace(/\/$/, '').toLowerCase();
    if (p === '/lbe')  return 'lbe';
    if (p === '/game') return 'game';
    return 'default';
  })();

  /* Sort so VARIANT-matching projects come first.
     Projects without a match move to the end — not hidden. */
  function variantSort(projects) {
    if (VARIANT === 'default') return projects;
    return [...projects].sort((a, b) => {
      const aMatch = (a.tags || []).includes(VARIANT);
      const bMatch = (b.tags || []).includes(VARIANT);
      if (aMatch && !bMatch) return -1;
      if (!aMatch && bMatch) return  1;
      return 0;
    });
  }

  /* Optional: update page title per variant */
  if (VARIANT === 'lbe') {
    document.title = 'Doyeon Kim — LBE & Venue Environments';
  } else if (VARIANT === 'game') {
    document.title = 'Doyeon Kim — Game Environment Art';
  }

  /* ============================================================
     PASTE THE REST OF YOUR <script> CONTENT FROM index.html HERE.

     Then find where you call renderGrid() (or equivalent) and
     wrap the projects array with variantSort():

       renderGrid(el, variantSort(PROJECTS_PRIMARY));
       renderGrid(el2, variantSort(PROJECTS_SECONDARY));

     Also add a `tags` field to each project object, e.g.:

       { ..., tags: ['lbe'] }   // LBE venue work
       { ..., tags: ['game'] }  // Game environment work
       { ..., tags: ['lbe', 'game'] }  // fits both

     ============================================================ */

  </script>
